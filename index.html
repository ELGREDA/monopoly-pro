<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monopoly Neo-Bank PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at top, #0d1117 0%, #010409 100%);
            color: #e2e2e2;
            font-family: 'Orbitron', sans-serif;
            overflow-x: hidden;
        }
        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
        }
        .neon-cyan { box-shadow: 0 0 15px rgba(6, 182, 212, 0.15); }
        .neon-purple { box-shadow: 0 0 15px rgba(168, 85, 247, 0.15); }
        .neon-gold { box-shadow: 0 0 20px rgba(250, 204, 21, 0.2); }
        input[type="number"]::-webkit-inner-spin-button { display: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        
        /* Animación de carga para NFC */
        .nfc-scanning { animation: pulse-blue 1.5s infinite; }
        @keyframes pulse-blue {
            0% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(37, 99, 235, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); }
        }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col items-center relative">

    <nav class="w-full max-w-5xl flex justify-between items-center mb-6 border-b border-white/10 pb-4">
        <div class="flex items-center gap-2">
            <div id="sync-led" class="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_5px_#22c55e]"></div>
            <div id="nfc-status-label" class="text-[9px] text-gray-500 tracking-[0.3em]">SISTEMA ONLINE</div>
        </div>
        <div class="flex gap-2">
            <button onclick="cambiarVista('jugador')" class="text-[9px] bg-white/5 px-3 py-2 rounded font-bold uppercase border border-white/10">Jugador</button>
            <button onclick="intentarAccesoBanco()" class="text-[9px] bg-yellow-600/20 text-yellow-500 border border-yellow-500/30 px-3 py-2 rounded font-bold uppercase">Banco</button>
        </div>
    </nav>

    <header class="w-full max-w-4xl mb-6 text-center">
        <h1 id="main-title" class="text-3xl md:text-5xl font-black tracking-tighter text-white">
            MONOPOLY <span class="text-cyan-500 italic">SYSTEM</span>
        </h1>
    </header>

    <main id="vista-jugador" class="w-full max-w-5xl grid grid-cols-1 lg:grid-cols-2 gap-6">
        <section class="glass p-6 neon-cyan relative">
            <button onclick="confirmarReset('jugador')" class="absolute top-4 right-4 text-[8px] text-red-400 opacity-50 hover:opacity-100 uppercase tracking-widest font-bold">Reiniciar Wallet</button>
            <h2 class="text-xs text-cyan-400 font-bold mb-6 tracking-widest uppercase">Operaciones</h2>
            <div class="space-y-6">
                <div class="p-4 bg-white/5 rounded-xl">
                    <input id="monto-cobro-jugador" type="number" placeholder="Monto" class="w-full bg-transparent border-b border-cyan-500 p-2 text-xl text-center outline-none mb-3 font-mono text-white">
                    <button onclick="generarQR('cobro', 'jugador')" class="w-full bg-cyan-600 py-3 rounded-lg font-bold text-xs uppercase tracking-widest">Cobrar (QR)</button>
                </div>
                <div class="p-4 bg-white/5 rounded-xl">
                    <input id="monto-pago-jugador" type="number" placeholder="Monto" class="w-full bg-transparent border-b border-purple-500 p-2 text-xl text-center outline-none mb-3 font-mono text-white">
                    <div class="flex gap-2">
                        <button onclick="abrirCamara('jugador')" class="flex-1 bg-white/10 py-3 rounded-lg font-bold text-[9px] uppercase">Cámara</button>
                        <button onclick="procesarTransaccion('pago', 'jugador')" class="flex-1 bg-purple-600 py-3 rounded-lg font-bold text-[9px] uppercase text-white">Pagar</button>
                    </div>
                </div>
            </div>
        </section>

        <section class="glass p-6 neon-purple flex flex-col">
            <div class="text-center mb-6">
                <p class="text-gray-500 text-[9px] uppercase tracking-widest mb-1 italic">Balance Personal</p>
                <div class="text-5xl font-mono font-bold text-white tracking-tighter">
                    $<span id="saldo-jugador">0.00</span>
                </div>
            </div>
            <button id="btn-nfc-read" onclick="leerNFC()" class="w-full mb-6 bg-blue-600/20 border border-blue-500/50 p-4 rounded-xl text-blue-300 text-[10px] font-black tracking-widest transition-all">
                SOLICITAR PERMISO Y LEER NFC
            </button>
            <h3 class="text-[9px] font-bold text-gray-600 uppercase mb-3 tracking-widest border-b border-white/5 pb-2 italic">Registro de Turnos</h3>
            <div id="historial-jugador" class="space-y-2 overflow-y-auto max-h-[200px] custom-scrollbar text-white"></div>
        </section>
    </main>

    <main id="vista-banco" class="w-full max-w-5xl flex flex-col gap-6 hidden">
        <section class="glass p-8 neon-gold text-center bg-yellow-900/10 relative">
            <div class="flex justify-between absolute top-4 inset-x-4">
                <button onclick="cerrarSesionBanco()" class="text-[9px] bg-red-600/20 text-red-400 px-3 py-1 rounded border border-red-500/50 font-bold">LOGOUT BANCO</button>
                <button onclick="confirmarReset('banco')" class="text-[9px] text-yellow-600 font-bold uppercase tracking-widest">Reiniciar Banco</button>
            </div>
            <p class="text-yellow-500 text-[11px] uppercase mb-2 tracking-[0.5em] font-bold mt-4">Banco Central</p>
            <div class="text-6xl font-mono font-black text-white tracking-tighter mb-4">
                $<span id="saldo-banco">20580.00</span>
            </div>
            <button onclick="repartirInicial()" class="bg-yellow-600 hover:bg-yellow-500 text-white font-bold py-3 px-10 rounded-full text-[10px] tracking-widest shadow-xl transition-all">REPARTIR $1500 INICIALES</button>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <section class="glass p-6 neon-cyan">
                <h3 class="text-[10px] text-cyan-400 font-bold mb-6 block uppercase border-b border-white/5 pb-2">Gestión de Caja</h3>
                <div class="space-y-4">
                    <input id="monto-cobro-banco" type="number" placeholder="Ingreso Banco" class="w-full bg-black/40 border-b border-cyan-500 p-3 text-lg outline-none font-mono text-white">
                    <button onclick="generarQR('cobro', 'banco')" class="w-full bg-cyan-700 py-3 rounded-lg font-bold text-[9px] tracking-widest">GENERAR QR COBRO</button>
                    <hr class="border-white/5 my-2">
                    <input id="monto-pago-banco" type="number" placeholder="Egreso Banco" class="w-full bg-black/40 border-b border-purple-500 p-3 text-lg outline-none font-mono text-white">
                    <div class="flex flex-col gap-2">
                        <button onclick="generarQR('pago', 'banco')" class="w-full bg-purple-700 py-3 rounded-lg font-bold text-[9px] tracking-widest">GENERAR QR PAGO</button>
                        <div class="flex gap-2">
                            <button onclick="abrirCamara('banco')" class="flex-1 bg-white/5 py-3 rounded-lg font-bold text-[8px]">ESCANEAR JUGADOR</button>
                            <button onclick="procesarTransaccion('pago', 'banco')" class="flex-1 bg-white/10 py-3 rounded-lg font-bold text-[8px]">PAGO DIRECTO</button>
                        </div>
                    </div>
                </div>
            </section>

            <section class="glass p-6 border border-green-500/30 shadow-[0_0_15px_rgba(34,197,94,0.1)]">
                <h3 class="text-[10px] text-green-400 font-bold mb-6 block uppercase border-b border-white/5 pb-2">Hipotecas (Vía QR)</h3>
                <select id="select-propiedad" class="w-full bg-black/40 border-b border-green-500 p-3 text-xs outline-none font-mono text-white mb-6">
                    <option value="0">Seleccionar Propiedad...</option>
                    <option value="30">Av. Mediterráneo ($30)</option>
                    <option value="30">Av. Báltica ($30)</option>
                    <option value="50">Oriental ($50)</option>
                    <option value="50">Vermont ($50)</option>
                    <option value="60">Connecticut ($60)</option>
                    <option value="70">San Carlos ($70)</option>
                    <option value="70">Estados ($70)</option>
                    <option value="80">Virginia ($80)</option>
                    <option value="90">Santiago ($90)</option>
                    <option value="90">Tennessee ($90)</option>
                    <option value="100">Nueva York ($100)</option>
                    <option value="110">Kentucky ($110)</option>
                    <option value="110">Indiana ($110)</option>
                    <option value="120">Illinois ($120)</option>
                    <option value="130">Atlántico ($130)</option>
                    <option value="130">Ventnor ($130)</option>
                    <option value="140">Marvin Gardens ($140)</option>
                    <option value="150">Pacífico ($150)</option>
                    <option value="150">Carolina del Norte ($150)</option>
                    <option value="160">Pensilvania ($160)</option>
                    <option value="175">Park Place ($175)</option>
                    <option value="200">Boardwalk ($200)</option>
                    <option value="100">Estación Reading ($100)</option>
                    <option value="100">Estación Pensilvania ($100)</option>
                    <option value="100">Estación B&O ($100)</option>
                    <option value="100">Estación Short Line ($100)</option>
                    <option value="75">Servicio Eléctrico ($75)</option>
                    <option value="75">Servicio de Agua ($75)</option>
                </select>
                <div class="flex flex-col gap-3">
                    <button onclick="procesarHipoteca('hipotecar')" class="w-full bg-green-700/80 py-3 rounded-lg font-bold text-[9px] uppercase tracking-widest text-white hover:bg-green-600 transition">Hipotecar (Banco Paga)</button>
                    <button onclick="procesarHipoteca('deshipotecar')" class="w-full bg-red-700/80 py-3 rounded-lg font-bold text-[9px] uppercase tracking-widest text-white hover:bg-red-600 transition">Pagar Hipoteca +10%</button>
                </div>
            </section>

            <section class="glass p-6 border border-yellow-500/20">
                <h3 class="text-[10px] text-yellow-500 font-bold mb-6 block uppercase border-b border-white/5 pb-2 italic">Laboratorio NFC</h3>
                <input id="nfc-write-data" type="text" placeholder="Código de Tag (ej: SALIDA-200)" class="w-full bg-black/40 border border-yellow-500/30 p-3 text-sm outline-none rounded mb-4 text-white font-mono">
                <button id="btn-nfc-write" onclick="escribirNFC()" class="w-full bg-yellow-600/80 py-4 rounded-xl font-bold text-[10px] tracking-widest mb-6 shadow-inner">PROGRAMAR STICKER</button>
                <div id="historial-banco" class="space-y-2 overflow-y-auto max-h-[150px] custom-scrollbar text-white"></div>
            </section>
        </div>
    </main>

    <div id="modal-qr" class="hidden fixed inset-0 bg-black/95 z-[60] flex flex-col items-center justify-center p-6 text-center">
        <div id="qrcode" class="bg-white p-4 rounded-3xl mb-6"></div>
        <p id="display-qr" class="text-4xl font-bold text-cyan-400 mb-8 font-mono tracking-tighter"></p>
        <div class="flex gap-4 w-full max-w-xs">
            <button id="btn-confirmar-qr" class="flex-1 bg-cyan-600 py-4 rounded-xl font-bold text-xs uppercase tracking-widest text-white">Confirmar</button>
            <button onclick="cerrarModal('modal-qr')" class="flex-1 bg-white/10 py-4 rounded-xl font-bold text-xs uppercase text-white">Cerrar</button>
        </div>
    </div>

    <div id="modal-login" class="hidden fixed inset-0 bg-black/90 z-[80] flex flex-col items-center justify-center p-6">
        <div class="glass p-8 max-w-sm w-full border-yellow-500/40">
            <h2 class="text-xl font-bold text-yellow-500 text-center mb-6 tracking-widest">BANK AUTH</h2>
            <input id="login-user" type="text" placeholder="USUARIO" class="w-full bg-white/5 border-b border-yellow-500/50 p-3 mb-4 text-white text-center uppercase outline-none font-mono">
            <input id="login-pass" type="password" placeholder="CLAVE" class="w-full bg-white/5 border-b border-yellow-500/50 p-3 mb-8 text-white text-center outline-none font-mono">
            <button onclick="verificarLogin()" class="w-full bg-yellow-600 py-3 rounded font-bold text-xs tracking-widest text-white">DESBLOQUEAR TERMINAL</button>
            <button onclick="cerrarModal('modal-login')" class="w-full mt-4 text-gray-500 text-[9px] uppercase tracking-widest font-bold">Regresar</button>
        </div>
    </div>

    <div id="modal-camara" class="hidden fixed inset-0 bg-black z-[70] flex flex-col items-center justify-center p-4">
        <div id="reader" class="w-full max-w-md overflow-hidden rounded-2xl border-2 border-cyan-500 shadow-[0_0_20px_rgba(6,182,212,0.5)]"></div>
        <button onclick="cerrarCamara()" class="mt-8 bg-red-600 px-12 py-3 rounded-full font-bold text-xs text-white">FINALIZAR ESCANEO</button>
    </div>

    <script>
        // VARIABLES Y PERSISTENCIA
        let saldoJugador = parseFloat(localStorage.getItem('saldoJugador')) || 0.00;
        let saldoBanco = parseFloat(localStorage.getItem('saldoBanco')) || 20580.00;
        let logJugador = JSON.parse(localStorage.getItem('logJugador')) || [];
        let logBanco = JSON.parse(localStorage.getItem('logBanco')) || [];
        let isAdminLoggedIn = false;
        let html5QrCode = null;

        // --- VALIDACIÓN ESTRICTA DE PERMISOS NFC ---
        async function verificarPermisoNFC() {
            // REGLA FUNDAMENTAL DE SEGURIDAD DEL NAVEGADOR
            if (!window.isSecureContext) {
                alert("🛑 EL NAVEGADOR BLOQUEA EL NFC POR SEGURIDAD:\n\nPara que el navegador confíe en esta página y permita leer/escribir NFC, DEBE estar alojada en una dirección segura (HTTPS) o en 'localhost'.\n\nSi abriste esto como un archivo (file://) o en HTTP normal, el navegador asume que no es seguro y NUNCA ejecutará el NFC.");
                return false;
            }

            if (!('NDEFReader' in window)) {
                alert("⚠️ Tu navegador no soporta NFC. Asegúrate de usar Chrome en Android.");
                return false;
            }

            try {
                const permissionStatus = await navigator.permissions.query({ name: 'nfc' });
                if (permissionStatus.state === 'denied') {
                    alert("❌ ACCESO NFC DENEGADO PREVIAMENTE.\n\nPara usarlo, ve a los ajustes de tu navegador:\n1. Toca el candado en la barra de direcciones.\n2. Ve a Configuración de sitios.\n3. Activa 'NFC' y vuelve a intentar.");
                    return false;
                }
                return true;
            } catch (error) {
                return true; 
            }
        }

        // --- PROTOCOLO DE NFC MEJORADO ---
        async function leerNFC() {
            const btn = document.getElementById('btn-nfc-read');
            const statusLabel = document.getElementById('nfc-status-label');

            const puedeUsarNFC = await verificarPermisoNFC();
            if (!puedeUsarNFC) return;

            try {
                const ndef = new NDEFReader();
                await ndef.scan();
                
                btn.innerText = "ACERCA EL TAG AHORA...";
                btn.classList.add('nfc-scanning', 'bg-blue-600/40');
                statusLabel.innerText = "NFC: ESCANEANDO...";
                statusLabel.classList.add('text-blue-400');

                ndef.onreadingerror = () => {
                    alert("❌ Error de lectura: No se pudo leer el Tag. Intenta de nuevo.");
                };

                ndef.onreading = ({ message, serialNumber }) => {
                    saldoJugador += 200;
                    logJugador.push({ tipo: 'cobro', monto: 200, desc: 'Bono NFC (Salida)', date: new Date().toLocaleTimeString() });
                    
                    playSound();
                    saveToCache();
                    actualizarUI();
                    
                    alert("✅ ¡Tag Detectado! Saldo actualizado.");
                    
                    btn.innerText = "SOLICITAR PERMISO Y LEER NFC";
                    btn.classList.remove('nfc-scanning', 'bg-blue-600/40');
                    statusLabel.innerText = "SISTEMA ONLINE";
                    statusLabel.classList.remove('text-blue-400');
                };

            } catch (error) {
                if (error.name === "NotAllowedError") {
                    alert("❌ Has rechazado el permiso NFC o el navegador bloqueó la solicitud.");
                } else {
                    alert("❌ Error NFC: " + error.message);
                }
                console.error(error);
            }
        }

        async function escribirNFC() {
            const data = document.getElementById('nfc-write-data').value;
            const btn = document.getElementById('btn-nfc-write');

            if (!data) return alert("Escribe un código primero.");
            
            const puedeUsarNFC = await verificarPermisoNFC();
            if (!puedeUsarNFC) return;

            try {
                const ndef = new NDEFReader();
                btn.innerText = "ESCRIBIENDO... ACERCA EL TAG";
                btn.classList.add('nfc-scanning');

                await ndef.write(data);
                
                alert("✅ Sticker programado correctamente: " + data);
                logBanco.push({ tipo: 'cobro', monto: 0, desc: `NFC Programado: ${data}`, date: new Date().toLocaleTimeString() });
                
                btn.innerText = "PROGRAMAR STICKER";
                btn.classList.remove('nfc-scanning');
                document.getElementById('nfc-write-data').value = '';
                saveToCache();
                actualizarUI();

            } catch (error) {
                if (error.name === "NotAllowedError") {
                    alert("❌ Permiso denegado para escribir NFC.");
                } else {
                    alert("❌ Fallo al escribir: " + error.message);
                }
                btn.innerText = "PROGRAMAR STICKER";
                btn.classList.remove('nfc-scanning');
            }
        }

        // --- LÓGICA GENERAL ---
        function saveToCache() {
            localStorage.setItem('saldoJugador', saldoJugador);
            localStorage.setItem('saldoBanco', saldoBanco);
            localStorage.setItem('logJugador', JSON.stringify(logJugador));
            localStorage.setItem('logBanco', JSON.stringify(logBanco));
            const led = document.getElementById('sync-led');
            led.classList.add('bg-white');
            setTimeout(() => led.classList.remove('bg-white'), 200);
        }

        function playSound() {
            try {
                const context = new (window.AudioContext || window.webkitAudioContext)();
                const osc = context.createOscillator();
                const gain = context.createGain();
                osc.connect(gain); gain.connect(context.destination);
                osc.type = 'sine'; osc.frequency.value = 880;
                gain.gain.setValueAtTime(0.1, context.currentTime);
                osc.start(); osc.stop(context.currentTime + 0.1);
            } catch(e) {}
        }

        function cambiarVista(vista) {
            document.getElementById('vista-jugador').classList.toggle('hidden', vista === 'banco');
            document.getElementById('vista-banco').classList.toggle('hidden', vista === 'jugador');
            document.getElementById('main-title').innerHTML = vista === 'jugador' ? 'MONOPOLY <span class="text-cyan-500 italic">SYSTEM</span>' : 'BANCO <span class="text-yellow-500 italic">CENTRAL</span>';
        }

        function intentarAccesoBanco() {
            isAdminLoggedIn ? cambiarVista('banco') : document.getElementById('modal-login').classList.remove('hidden');
        }

        function verificarLogin() {
            const user = document.getElementById('login-user').value.trim().toUpperCase();
            const pass = document.getElementById('login-pass').value.trim();
            if (user === 'ADMIN' && pass === '19921706') {
                isAdminLoggedIn = true;
                cerrarModal('modal-login');
                cambiarVista('banco');
            } else { alert("ACCESO DENEGADO"); }
        }

        function cerrarSesionBanco() {
            isAdminLoggedIn = false;
            cambiarVista('jugador');
        }

        function procesarTransaccion(tipo, entidad) {
            const input = document.getElementById(`monto-${tipo}-${entidad}`);
            const monto = parseFloat(input.value);
            if (isNaN(monto) || monto <= 0) return;
            if (entidad === 'jugador') {
                if (tipo === 'pago' && monto > saldoJugador) return alert("SALDO INSUFICIENTE");
                saldoJugador += (tipo === 'cobro' ? monto : -monto);
                logJugador.push({ tipo, monto, desc: tipo === 'cobro' ? 'Ingreso Automático/Manual' : 'Pago Automático/Manual', date: new Date().toLocaleTimeString() });
            } else {
                saldoBanco += (tipo === 'cobro' ? monto : -monto);
                logBanco.push({ tipo, monto, desc: tipo === 'cobro' ? 'Cobro Banco' : 'Pago Banco', date: new Date().toLocaleTimeString() });
            }
            input.value = '';
            cerrarModal('modal-qr');
            saveToCache();
            actualizarUI();
            playSound();
        }

        function generarQR(tipo, entidad) {
            const monto = parseFloat(document.getElementById(`monto-${tipo}-${entidad}`).value);
            if (isNaN(monto) || monto <= 0) return alert("Ingrese monto");
            const qrContainer = document.getElementById('qrcode');
            qrContainer.innerHTML = '';
            
            new QRCode(qrContainer, { text: `MNPLY-${tipo}-${monto}`, width: 220, height: 220 });
            
            document.getElementById('display-qr').innerText = `$${monto.toFixed(2)}`;
            document.getElementById('btn-confirmar-qr').onclick = () => procesarTransaccion(tipo, entidad);
            document.getElementById('modal-qr').classList.remove('hidden');
        }

        function procesarHipoteca(accion) {
            const select = document.getElementById('select-propiedad');
            const valorHipoteca = parseFloat(select.value);
            
            if (isNaN(valorHipoteca) || valorHipoteca <= 0) {
                return alert("Por favor, seleccione una propiedad válida de la lista.");
            }

            if (accion === 'hipotecar') {
                document.getElementById('monto-pago-banco').value = valorHipoteca;
                generarQR('pago', 'banco');
            } else if (accion === 'deshipotecar') {
                const valorDeshipoteca = valorHipoteca + (valorHipoteca * 0.10);
                document.getElementById('monto-cobro-banco').value = valorDeshipoteca;
                generarQR('cobro', 'banco');
                alert(`Regla Monopoly: Se aplicó un 10% de interés para levantar la hipoteca. El jugador debe escanear para pagar $${valorDeshipoteca}`);
            }
        }

        function repartirInicial() {
            document.getElementById('monto-pago-banco').value = 1500;
            generarQR('pago', 'banco');
        }

        // --- CÁMARA CON PETICIÓN DE PERMISO EXPLÍCITA ---
        function abrirCamara(entidad) {
            // Solicitar explícitamente permisos de cámara al navegador ANTES de abrir el UI
            Html5Qrcode.getCameras().then(devices => {
                if (devices && devices.length) {
                    document.getElementById('modal-camara').classList.remove('hidden');
                    
                    if (!html5QrCode) {
                        html5QrCode = new Html5Qrcode("reader");
                    }

                    html5QrCode.start(
                        { facingMode: "environment" }, 
                        { fps: 10, qrbox: 250 }, 
                        (text) => {
                            const parts = text.split('-');
                            if (parts[0] === 'MNPLY' && parts.length === 3) {
                                const tipoQR = parts[1]; 
                                const monto = parseFloat(parts[2]);

                                if(!isNaN(monto)) {
                                    cerrarCamara(); 
                                    playSound();

                                    if (tipoQR === 'cobro') {
                                        // Si el otro generó un COBRO, YO debo PAGAR
                                        if (entidad === 'jugador' && monto > saldoJugador) {
                                            alert("SALDO INSUFICIENTE PARA REALIZAR ESTE PAGO");
                                            return;
                                        }
                                        document.getElementById(`monto-pago-${entidad}`).value = monto;
                                        procesarTransaccion('pago', entidad);
                                        alert(`TRANSACCIÓN EXITOSA: Has pagado $${monto} automáticamente.`);
                                        
                                    } else if (tipoQR === 'pago') {
                                        // Si el otro generó un PAGO, YO debo COBRAR
                                        document.getElementById(`monto-cobro-${entidad}`).value = monto;
                                        procesarTransaccion('cobro', entidad);
                                        alert(`TRANSACCIÓN EXITOSA: Has recibido $${monto} automáticamente.`);
                                    }
                                }
                            }
                        },
                        (errorMessage) => {}
                    ).catch((err) => {
                        console.error("Error iniciando cámara:", err);
                        alert("No se pudo iniciar la cámara. Verifica los permisos del navegador.");
                        cerrarModal('modal-camara'); 
                    });
                }
            }).catch(err => {
                alert("❌ PERMISO DE CÁMARA DENEGADO. Debes permitir el acceso a la cámara en tu navegador para poder escanear.");
            });
        }

        function cerrarCamara() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    html5QrCode.clear();
                    document.getElementById('modal-camara').classList.add('hidden');
                }).catch((err) => {
                    console.warn("Forzando cierre de cámara.");
                    document.getElementById('modal-camara').classList.add('hidden');
                });
            } else {
                document.getElementById('modal-camara').classList.add('hidden');
            }
        }

        function confirmarReset(entidad) {
            if (confirm("¿Seguro que quieres reiniciar? Se borrarán los saldos y el historial.")) {
                if (entidad === 'jugador') { saldoJugador = 0; logJugador = []; }
                else { saldoBanco = 20580; logBanco = []; }
                saveToCache(); actualizarUI();
            }
        }

        function actualizarUI() {
            document.getElementById('saldo-jugador').innerText = saldoJugador.toLocaleString();
            document.getElementById('saldo-banco').innerText = saldoBanco.toLocaleString();
            const renderLog = (log, elementId) => {
                const list = document.getElementById(elementId);
                list.innerHTML = log.slice().reverse().map(item => `
                    <div class="flex justify-between p-2 rounded bg-white/5 border-l-2 ${item.tipo==='cobro'?'border-cyan-500':'border-purple-500'} mb-1 text-[10px]">
                        <div class="flex flex-col text-left">
                            <span class="font-bold text-gray-300">${item.desc}</span>
                            <span class="text-[8px] text-gray-600">${item.date}</span>
                        </div>
                        <span class="font-bold font-mono ${item.tipo==='cobro'?'text-cyan-400':'text-purple-400'}">
                            ${item.tipo==='cobro'?'+':'-'}$${item.monto}
                        </span>
                    </div>
                `).join('');
            };
            renderLog(logJugador, 'historial-jugador');
            renderLog(logBanco, 'historial-banco');
        }

        function cerrarModal(id) { document.getElementById(id).classList.add('hidden'); }
        actualizarUI();
    </script>
</body>
</html>
